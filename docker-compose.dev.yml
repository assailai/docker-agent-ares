# =============================================================================
# Ares Docker Agent - Docker Compose (for development/testing)
# =============================================================================
#
# Usage:
#   docker-compose up -d
#   docker-compose logs -f
#
# =============================================================================

services:
  ares-agent:
    build: .
    container_name: ares-agent
    hostname: ares-agent
    user: root
    ports:
      - "8443:8443"
    volumes:
      - ares-agent-data:/data
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    environment:
      - DATA_DIR=/data
      - LOG_LEVEL=INFO
      - ARES_RUN_AS_ROOT=true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost:8443/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  ares-agent-data:
    driver: local
